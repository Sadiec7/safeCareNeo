<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" width="760" height="520" font-family="monospace, sans-serif">

  <!-- Background -->
  <rect width="760" height="520" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="380" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#e0e0e0">Esquemático — Sensor BME280 + ESP32</text>
  <text x="380" y="56" text-anchor="middle" font-size="12" fill="#888">safeCareNeo · Nodo Transmisor de Temperatura / Humedad / Presión</text>

  <!-- ═══════════════ ESP32 CHIP ═══════════════ -->
  <rect x="80" y="90" width="180" height="340" rx="8" fill="#16213e" stroke="#4fc3f7" stroke-width="2"/>
  <text x="170" y="115" text-anchor="middle" font-size="14" font-weight="bold" fill="#4fc3f7">ESP32</text>
  <text x="170" y="132" text-anchor="middle" font-size="10" fill="#90caf9">NodeMCU / DevKit</text>

  <!-- ESP32 pins (left side) -->
  <!-- 3.3V -->
  <rect x="80" y="150" width="60" height="20" rx="3" fill="#2d4a22" stroke="#66bb6a" stroke-width="1"/>
  <text x="112" y="164" text-anchor="middle" font-size="10" fill="#66bb6a">3.3V</text>
  <line x1="80" y1="160" x2="60" y2="160" stroke="#66bb6a" stroke-width="2"/>

  <!-- GND -->
  <rect x="80" y="185" width="60" height="20" rx="3" fill="#3a2020" stroke="#ef5350" stroke-width="1"/>
  <text x="112" y="199" text-anchor="middle" font-size="10" fill="#ef5350">GND</text>
  <line x1="80" y1="195" x2="60" y2="195" stroke="#ef5350" stroke-width="2"/>

  <!-- GPIO21 (SDA) -->
  <rect x="80" y="220" width="60" height="20" rx="3" fill="#1a237e" stroke="#7986cb" stroke-width="1"/>
  <text x="112" y="234" text-anchor="middle" font-size="10" fill="#7986cb">GPIO21</text>
  <text x="148" y="234" font-size="9" fill="#7986cb"> SDA</text>
  <line x1="80" y1="230" x2="60" y2="230" stroke="#7986cb" stroke-width="2"/>

  <!-- GPIO22 (SCL) -->
  <rect x="80" y="255" width="60" height="20" rx="3" fill="#1a237e" stroke="#ce93d8" stroke-width="1"/>
  <text x="112" y="269" text-anchor="middle" font-size="10" fill="#ce93d8">GPIO22</text>
  <text x="148" y="269" font-size="9" fill="#ce93d8"> SCL</text>
  <line x1="80" y1="265" x2="60" y2="265" stroke="#ce93d8" stroke-width="2"/>

  <!-- WiFi antenna symbol -->
  <text x="170" y="310" text-anchor="middle" font-size="11" fill="#888">📡 WiFi 802.11 b/g/n</text>
  <text x="170" y="328" text-anchor="middle" font-size="10" fill="#666">Envío HTTP → Backend</text>
  <text x="170" y="346" text-anchor="middle" font-size="10" fill="#666">POST /api/sensor-data</text>
  <text x="170" y="364" text-anchor="middle" font-size="10" fill="#666">cada 5 segundos</text>

  <!-- ═══════════════ BME280 SENSOR ═══════════════ -->
  <rect x="450" y="130" width="200" height="220" rx="8" fill="#16213e" stroke="#ffb74d" stroke-width="2"/>
  <text x="550" y="155" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffb74d">BME280</text>
  <text x="550" y="172" text-anchor="middle" font-size="10" fill="#ffe0b2">Bosch Sensortec</text>
  <text x="550" y="188" text-anchor="middle" font-size="9" fill="#888">I²C Address: 0x76 / 0x77</text>

  <!-- BME280 pins (left side) -->
  <!-- VCC -->
  <rect x="450" y="205" width="55" height="20" rx="3" fill="#2d4a22" stroke="#66bb6a" stroke-width="1"/>
  <text x="479" y="219" text-anchor="middle" font-size="10" fill="#66bb6a">VCC</text>
  <line x1="450" y1="215" x2="420" y2="215" stroke="#66bb6a" stroke-width="2"/>

  <!-- GND -->
  <rect x="450" y="240" width="55" height="20" rx="3" fill="#3a2020" stroke="#ef5350" stroke-width="1"/>
  <text x="479" y="254" text-anchor="middle" font-size="10" fill="#ef5350">GND</text>
  <line x1="450" y1="250" x2="420" y2="250" stroke="#ef5350" stroke-width="2"/>

  <!-- SDA -->
  <rect x="450" y="275" width="55" height="20" rx="3" fill="#1a237e" stroke="#7986cb" stroke-width="1"/>
  <text x="479" y="289" text-anchor="middle" font-size="10" fill="#7986cb">SDA</text>
  <line x1="450" y1="285" x2="420" y2="285" stroke="#7986cb" stroke-width="2"/>

  <!-- SCL -->
  <rect x="450" y="310" width="55" height="20" rx="3" fill="#1a237e" stroke="#ce93d8" stroke-width="1"/>
  <text x="479" y="324" text-anchor="middle" font-size="10" fill="#ce93d8">SCL</text>
  <line x1="450" y1="320" x2="420" y2="320" stroke="#ce93d8" stroke-width="2"/>

  <!-- Sensor measurements display -->
  <text x="550" y="370" text-anchor="middle" font-size="10" fill="#888">Rango temperatura: -40 a 85 °C</text>
  <text x="550" y="385" text-anchor="middle" font-size="10" fill="#888">Rango humedad: 0–100 %RH</text>
  <text x="550" y="400" text-anchor="middle" font-size="10" fill="#888">Rango presión: 300–1100 hPa</text>

  <!-- ═══════════════ CONNECTING WIRES ═══════════════ -->
  <!-- Junction nodes -->
  <!-- 3.3V wire ESP32 → BME280 VCC -->
  <line x1="60" y1="160" x2="60" y2="215" stroke="#66bb6a" stroke-width="2"/>
  <line x1="60" y1="215" x2="420" y2="215" stroke="#66bb6a" stroke-width="2"/>
  <!-- label -->
  <text x="240" y="210" text-anchor="middle" font-size="9" fill="#66bb6a">3.3 V</text>

  <!-- GND wire ESP32 → BME280 GND -->
  <line x1="60" y1="195" x2="60" y2="250" stroke="#ef5350" stroke-width="2" stroke-dasharray="4,2"/>
  <line x1="60" y1="250" x2="420" y2="250" stroke="#ef5350" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="240" y="244" text-anchor="middle" font-size="9" fill="#ef5350">GND</text>

  <!-- SDA wire GPIO21 → SDA -->
  <line x1="60" y1="230" x2="40" y2="230" stroke="#7986cb" stroke-width="2"/>
  <line x1="40" y1="230" x2="40" y2="285" stroke="#7986cb" stroke-width="2"/>
  <line x1="40" y1="285" x2="420" y2="285" stroke="#7986cb" stroke-width="2"/>
  <text x="240" y="279" text-anchor="middle" font-size="9" fill="#7986cb">SDA (I²C Data)</text>

  <!-- SCL wire GPIO22 → SCL -->
  <line x1="60" y1="265" x2="20" y2="265" stroke="#ce93d8" stroke-width="2"/>
  <line x1="20" y1="265" x2="20" y2="320" stroke="#ce93d8" stroke-width="2"/>
  <line x1="20" y1="320" x2="420" y2="320" stroke="#ce93d8" stroke-width="2"/>
  <text x="240" y="314" text-anchor="middle" font-size="9" fill="#ce93d8">SCL (I²C Clock)</text>

  <!-- ═══════════════ 10kΩ PULL-UP RESISTORS ═══════════════ -->
  <!-- SDA pull-up -->
  <rect x="310" y="156" width="40" height="16" rx="3" fill="#2a2a40" stroke="#ffd54f" stroke-width="1.5"/>
  <text x="330" y="168" text-anchor="middle" font-size="9" fill="#ffd54f">10kΩ</text>
  <line x1="330" y1="156" x2="330" y2="130" stroke="#ffd54f" stroke-width="1.5"/>
  <line x1="330" y1="172" x2="330" y2="285" stroke="#ffd54f" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="355" y="148" font-size="8" fill="#ffd54f">R1 (SDA)</text>

  <!-- SCL pull-up -->
  <rect x="360" y="156" width="40" height="16" rx="3" fill="#2a2a40" stroke="#ffd54f" stroke-width="1.5"/>
  <text x="380" y="168" text-anchor="middle" font-size="9" fill="#ffd54f">10kΩ</text>
  <line x1="380" y1="156" x2="380" y2="130" stroke="#ffd54f" stroke-width="1.5"/>
  <line x1="380" y1="172" x2="380" y2="320" stroke="#ffd54f" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="405" y="148" font-size="8" fill="#ffd54f">R2 (SCL)</text>

  <!-- 3.3V rail for pull-ups -->
  <line x1="330" y1="130" x2="380" y2="130" stroke="#66bb6a" stroke-width="1.5"/>
  <line x1="305" y1="130" x2="330" y2="130" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="355" y="125" text-anchor="middle" font-size="8" fill="#66bb6a">3.3V</text>

  <!-- Decoupling capacitor -->
  <line x1="620" y1="205" x2="680" y2="205" stroke="#66bb6a" stroke-width="1.5"/>
  <line x1="620" y1="250" x2="680" y2="250" stroke="#ef5350" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="680" y1="215" x2="680" y2="205" stroke="#66bb6a" stroke-width="1.5"/>
  <line x1="680" y1="225" x2="680" y2="230" stroke="#888" stroke-width="1.5"/>
  <line x1="680" y1="235" x2="680" y2="250" stroke="#ef5350" stroke-width="1.5" stroke-dasharray="4,2"/>
  <rect x="672" y="215" width="16" height="3" rx="1" fill="#a0a0a0"/>
  <rect x="672" y="227" width="16" height="3" rx="1" fill="#a0a0a0"/>
  <text x="700" y="228" font-size="8" fill="#ffd54f">100nF</text>
  <text x="700" y="238" font-size="8" fill="#ffd54f">C1</text>

  <!-- ═══════════════ LEGEND ═══════════════ -->
  <rect x="80" y="460" width="600" height="42" rx="6" fill="#0d1b2a" stroke="#444" stroke-width="1"/>
  <text x="100" y="477" font-size="10" fill="#66bb6a">█ 3.3V / VCC</text>
  <text x="200" y="477" font-size="10" fill="#ef5350">▬ GND</text>
  <text x="280" y="477" font-size="10" fill="#7986cb">── SDA (GPIO21)</text>
  <text x="420" y="477" font-size="10" fill="#ce93d8">── SCL (GPIO22)</text>
  <text x="560" y="477" font-size="10" fill="#ffd54f">□ Resistencias / Cond.</text>
  <text x="100" y="494" font-size="9" fill="#888">Nota: Las resistencias pull-up (R1, R2) son opcionales si el módulo BME280 ya las incluye en la placa.</text>

</svg>
